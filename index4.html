<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão interativo</title>

     <style>
    body {
      color: white;
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
      transition: 0.5s;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background-color: limegreen;
      color: white;
      cursor: pointer;

    }
  </style>



</head>
<body>
    <input id="texto" type="text" placeholder="Escreva seu nome">
    <button onclick="ativarinvisibilidade()">Ativar invisibilidade
    </button>

    <script>
    function ativarinvisibilidade() {
      document.body.style.backgroundColor = "green";
      document.getElementById("texto").value = "invisibilidade ativado!";
    }
  </script>
    
</body>
</html>
