<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troca de tema</title>
<style>
    body {
      text-align: center;
      transition: 0.5s;
    }

    .claro {
      background-color: white;
      color: black;
    }

    .escuro {
      background-color: #222;
      color: white;
    }

    button {
      margin-top: 100px;
      padding: 15px 25px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>

</head>
<body class="claro">
    <h1>Alterar tema</h1>
    <button onclick="trocarTema()">Trocar</button>

    <script>
    function trocarTema() {
      document.body.classList.toggle("escuro");
      document.body.classList.toggle("claro");
    }
  </script>

    
</body>
</html>
