<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de pontuação</title>


    <style>
    body {
      text-align: center;
      margin-top: 100px;
      background-color: #0660e6;
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 15px 25px;
      font-size: 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .ganhar {
      background-color: green;
      color: white;
    }

    .perder {
      background-color: red;
      color: white;
    }
  </style>
</head>
<body>
     <h1 id="xp">XP: 0</h1>

  <button class="ganhar" onclick="ganharXP()">+10 XP</button>
  <button class="perder" onclick="perderXP()">-5 XP</button>

  <script>
    let pontos = 0;

    function ganharXP() {
      pontos = pontos + 10;
      document.getElementById("xp").innerHTML = "XP: " + pontos;
    }

    function perderXP() {
      pontos = pontos - 5;
      document.getElementById("xp").innerHTML = "XP: " + pontos;
    }
  </script>
</body>
</html>
