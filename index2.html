<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de herói</title>

    <style>
        .card {
      width: 300px;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px;
      background: #f0f0f0;
      font-family: Arial;
        }

        .card img {
  width: 100%;
  height: 290px;
  object-fit: cover;
  border-radius: 10px;
}

        .barra {
      background: lightgray;
     
     
    }

    .preenchimento {
      height: 20px;
      background: green;
    }
    </style>
</head>
<body>
    <div class="card">
        <img src="Homem aranha.webp" alt="Home aranha">
        <h2> Homem-aranha</h2>
        <p>Tipo:Herói/MARVEL</p>

        <p>VIDA</p>
        <div class="Barra"></div>
        <div class="preenchimento" style="width:80%;">
        </div>
        <p>80%</p>

        <p>PODER</p>
        <div class="Barra"></div>
        <div class="preenchimento" style="width:95%;">
        </div>
        <p>95%</p>

        <p>VELOCIDADE</p>
        <div class="Barra"></div>
        <div class="preenchimento" style="width:90%;">
        </div>
        <p>90%</p>
    </div>
    
</body>
</html>
